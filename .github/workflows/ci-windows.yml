name: OpenRV Windows

on:
  workflow_call:
    inputs:
      skip_deps_cache:
        type: string
        default: 'false'
      qt5_modules:
        type: string
        default: 'debug_info qtcharts qtdatavis3d qtlottie qtnetworkauth qtquick3d qtquicktimeline qtscript qtwebengine qtwebglplugin'
      full_matrix:
        type: string
        default: 'true'
      run_debug:
        type: string
        default: 'true'

jobs:
  # Always runs — CY2024 Release only (PR scope)
  windows-pr:
    name: 'Windows ${{ matrix.vfx-platform }}
      <${{ matrix.os }}
       msvc=${{ matrix.msvc-component }},
       qt=${{ matrix.qt-version }},
       python=${{ matrix.python-version }},
       cmake=${{ matrix.cmake-version }},
       arch=${{ matrix.arch-type }},
       config=${{ matrix.build-type }}>'

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "windows-2022"
            arch-type: "x86_64"
            build-type: "Release"
            qt-version: "6.5.3"
            python-version: "3.11"
            cmake-version: "3.31.6"
            vfx-platform: "CY2024"
            msvc-component: "14.40.17.10.x86.x64"
            msvc-compiler: "14.40.33807"

    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: false
    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          submodules: recursive
      - uses: ./.github/actions/build-windows
        with:
          build-type: ${{ matrix.build-type }}
          qt-version: ${{ matrix.qt-version }}
          python-version: ${{ matrix.python-version }}
          cmake-version: ${{ matrix.cmake-version }}
          vfx-platform: ${{ matrix.vfx-platform }}
          msvc-component: ${{ matrix.msvc-component }}
          msvc-compiler: ${{ matrix.msvc-compiler }}
          qt5_modules: ${{ inputs.qt5_modules }}
      - name: Package Windows Build Artifacts
        shell: msys2 {0}
        run: |
          zip -r OpenRV-Windows-${{ matrix.vfx-platform }}-${{ matrix.build-type }}.zip _install/
      - name: Upload Windows Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenRV-Windows-${{ matrix.vfx-platform }}-${{ matrix.build-type }}
          path: OpenRV-Windows-${{ matrix.vfx-platform }}-${{ matrix.build-type }}.zip

